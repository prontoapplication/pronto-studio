<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Pronto Studio Application Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        .logo-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .main-bg {
            background-image: url('https://media.discordapp.net/attachments/1481675942693965874/1489421948080488458/4189768043_11177482306_1775173994708.png?ex=69e0d688&is=69df8508&hm=910c083c3eddeca676e379f405b2951f9ea9e8ec4835fa7db6b0ae21f0ed6910&=&format=webp&quality=lossless&width=1086&height=571');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .lil-logo {
            width: 52px;
            height: 52px;
            object-fit: cover;
            border-radius: 18px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.4s ease;
        }
        
        .lil-logo:hover {
            transform: scale(1.15) rotate(8deg);
        }

        .highlight-text {
            color: #3b82f6;
            font-weight: 700;
        }

        .form-input {
            background-color: #0f172a !important;
            color: #f1f5f9 !important;
            border: 2px solid #475569 !important;
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            border-color: #60a5fa !important;
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.3);
            transform: scale(1.02);
        }

        .page {
            display: none;
        }
        
        .page.active {
            display: block;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="main-bg text-slate-100 min-h-screen">

    <!-- NAVBAR -->
    <nav class="bg-slate-900/95 backdrop-blur-lg border-b border-slate-700 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3 cursor-pointer" onclick="navigateTo('home')">
                <img src="https://media.discordapp.net/attachments/1486474461283876994/1494063707263729734/IMG_0369.png?ex=69e13ec2&is=69dfed42&hm=e2da0bfa1007bbd93d951f86932cdf8a6207a661535990e87aacbc0755574657&=&format=webp&quality=lossless&width=640&height=675" 
                     alt="Lil Logo" class="lil-logo">
                <h1 class="logo-font text-2xl tracking-tighter hover:text-blue-400 transition-colors">
                    Pronto Studio
                </h1>
            </div>

            <div class="hidden md:flex gap-x-8 text-sm font-medium">
                <button onclick="navigateTo('home')" class="hover:text-blue-400">Home</button>
                <button onclick="navigateTo('creator')" class="hover:text-blue-400">Content Creator Application</button>
                <button onclick="navigateTo('staff')" class="hover:text-blue-400">Staff Application</button>
            </div>
        </div>
    </nav>

    <!-- HOME PAGE -->
    <div id="page-home" class="page active min-h-screen flex items-center">
        <div class="max-w-screen-2xl mx-auto px-6 py-20 text-center">
            <img src="https://media.discordapp.net/attachments/1486474461283876994/1494063707263729734/IMG_0369.png?ex=69e13ec2&is=69dfed42&hm=e2da0bfa1007bbd93d951f86932cdf8a6207a661535990e87aacbc0755574657&=&format=webp&quality=lossless&width=640&height=675" 
                 alt="Lil Logo" class="mx-auto mb-10 w-44 h-44 rounded-3xl shadow-2xl">

            <h1 class="hero-title text-5xl md:text-7xl tracking-[-4px] mb-6">
                Welcome to <span class="highlight-text">Pronto Studio</span><br>Application Center
            </h1>
            
            <p class="text-xl md:text-2xl text-slate-300 max-w-2xl mx-auto mb-12">
                Join the next generation of creators and staff in Streetz War 2 community.
            </p>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <button onclick="navigateTo('creator')" 
                        class="bg-blue-600 hover:bg-blue-700 px-12 py-5 rounded-3xl font-semibold text-lg transition-all">
                    Apply as Content Creator
                </button>
                <button onclick="navigateTo('staff')" 
                        class="border-2 border-white/70 hover:bg-white/10 px-12 py-5 rounded-3xl font-semibold text-lg transition-all">
                    Apply for Staff
                </button>
            </div>
        </div>
    </div>

    <!-- CONTENT CREATOR FORM -->
    <div id="page-creator" class="page hidden py-16">
        <div class="max-w-2xl mx-auto px-6">
            <div class="bg-slate-900/95 backdrop-blur-xl rounded-3xl p-10">
                <h2 class="text-3xl font-semibold mb-8 text-center">Content Creator Application</h2>
                
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">Roblox User (Streetz War 2 Name) <span class="text-red-500">*</span></label>
                        <input id="c-roblox" type="text" required class="form-input w-full h-14 rounded-3xl px-6">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">Discord Name or ID <span class="text-red-500">*</span></label>
                        <input id="c-discord" type="text" required class="form-input w-full h-14 rounded-3xl px-6">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">Social Links <span class="text-red-500">*</span></label>
                        <input id="c-social" type="text" required class="form-input w-full h-14 rounded-3xl px-6">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">Total Followers <span class="text-red-500">*</span></label>
                        <input id="c-followers" type="text" required class="form-input w-full h-14 rounded-3xl px-6">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">Why do you want to join? <span class="text-red-500">*</span></label>
                        <textarea id="c-why" rows="4" required class="form-input w-full rounded-3xl p-6"></textarea>
                    </div>

                    <button onclick="submitCreatorForm()" 
                            class="w-full h-14 bg-blue-600 hover:bg-blue-700 rounded-3xl font-semibold text-lg">
                        Submit Application
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- STAFF FORM -->
    <div id="page-staff" class="page hidden py-16">
        <div class="max-w-2xl mx-auto px-6">
            <div class="bg-slate-900/95 backdrop-blur-xl rounded-3xl p-10">
                <h2 class="text-3xl font-semibold mb-8 text-center">Staff Application</h2>
                
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">Roblox User (Streetz War 2 Name) <span class="text-red-500">*</span></label>
                        <input id="s-roblox" type="text" required class="form-input w-full h-14 rounded-3xl px-6">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">Discord Name or ID <span class="text-red-500">*</span></label>
                        <input id="s-discord" type="text" required class="form-input w-full h-14 rounded-3xl px-6">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">Position You're Applying For <span class="text-red-500">*</span></label>
                        <input id="s-position" type="text" required class="form-input w-full h-14 rounded-3xl px-6">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">Why do you want to become staff? <span class="text-red-500">*</span></label>
                        <textarea id="s-why" rows="5" required class="form-input w-full rounded-3xl p-6"></textarea>
                    </div>

                    <button onclick="submitStaffForm()" 
                            class="w-full h-14 bg-blue-600 hover:bg-blue-700 rounded-3xl font-semibold text-lg">
                        Submit Staff Application
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- SUCCESS SCREEN -->
    <div id="confirmation-screen" class="page hidden min-h-screen flex items-center justify-center">
        <div class="text-center max-w-md px-6">
            <div class="text-8xl mb-6">🎉</div>
            <h2 class="text-4xl font-semibold mb-4">Application Submitted Successfully!</h2>
            <p class="text-slate-400 text-lg mb-8">
                Please wait 24-48 hours for a response.<br>
                <span class="text-red-400">Do not ping the owners.</span>
            </p>
            <button onclick="navigateTo('home')" 
                    class="px-12 py-4 bg-blue-600 hover:bg-blue-700 rounded-3xl font-semibold text-lg">
                Return to Home
            </button>
        </div>
    </div>

    <script>
        function navigateTo(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${page}`).classList.add('active');
        }

        function submitCreatorForm() {
            if (!validateForm('page-creator')) return;
            sendToDiscord("creator");
            showConfirmation();
        }

        function submitStaffForm() {
            if (!validateForm('page-staff')) return;
            sendToDiscord("staff");
            showConfirmation();
        }

        function validateForm(pageId) {
            const inputs = document.querySelectorAll(`#${pageId} input[required], #${pageId} textarea[required]`);
            let valid = true;

            inputs.forEach(input => {
                if (!input.value.trim()) {
                    input.style.borderColor = '#ef4444';
                    valid = false;
                } else {
                    input.style.borderColor = '#60a5fa';
                }
            });

            if (!valid) alert("Please fill in all required fields.");
            return valid;
        }

        async function sendToDiscord(type) {
            // Your webhook is here
            console.log(`${type} application submitted`);
        }

        function showConfirmation() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('confirmation-screen').classList.add('active');

            // Auto return to home after 4 seconds
            setTimeout(() => {
                navigateTo('home');
            }, 4000);
        }

        window.onload = () => navigateTo('home');
    </script>
</body>
</html>
