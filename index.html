<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Pronto Studio Application Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        .logo-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .main-bg {
            background-image: url('https://media.discordapp.net/attachments/1481675942693965874/1489421948080488458/4189768043_11177482306_1775173994708.png?ex=69e0d688&is=69df8508&hm=910c083c3eddeca676e379f405b2951f9ea9e8ec4835fa7db6b0ae21f0ed6910&=&format=webp&quality=lossless&width=1086&height=571');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        .main-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(15, 23, 42, 0.78), rgba(15, 23, 42, 0.88));
            z-index: -1;
        }

        .lil-logo {
            width: 52px;
            height: 52px;
            object-fit: contain;
            transition: transform 0.4s ease;
        }
        .lil-logo:hover {
            transform: scale(1.1) rotate(8deg);
        }

        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-card {
            transition: all 0.4s ease;
        }
        .form-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }

        button {
            transition: all 0.3s ease;
        }
        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="main-bg text-slate-100 min-h-screen overflow-x-hidden">

    <!-- NAVBAR -->
    <nav class="bg-slate-900/95 backdrop-blur-lg border-b border-slate-700 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <img src="https://media.discordapp.net/attachments/1486474461283876994/1494063707263729734/IMG_0369.png?ex=69e13ec2&is=69dfed42&hm=e2da0bfa1007bbd93d951f86932cdf8a6207a661535990e87aacbc0755574657&=&format=webp&quality=lossless&width=640&height=675" 
                     alt="Lil Logo" class="lil-logo">
                <h1 class="logo-font text-2xl tracking-tighter">Pronto Studio</h1>
            </div>

            <div class="hidden md:flex gap-x-8 text-sm font-medium">
                <button onclick="navigateTo('home')" class="hover:text-blue-400 transition-colors">Home</button>
                <button onclick="navigateTo('creator')" class="hover:text-blue-400 transition-colors">Creator Application</button>
                <button onclick="navigateTo('staff')" class="hover:text-blue-400 transition-colors">Staff Application</button>
            </div>
        </div>
    </nav>

    <!-- HOME PAGE -->
    <div id="page-home" class="min-h-screen flex items-center relative">
        <div class="max-w-screen-2xl mx-auto px-6 py-20 text-center z-10">
            <img src="https://media.discordapp.net/attachments/1486474461283876994/1494063707263729734/IMG_0369.png?ex=69e13ec2&is=69dfed42&hm=e2da0bfa1007bbd93d951f86932cdf8a6207a661535990e87aacbc0755574657&=&format=webp&quality=lossless&width=640&height=675" 
                 alt="Lil Logo" class="mx-auto mb-6 w-40 h-40 fade-in" style="animation-delay: 0.2s">

            <h1 class="text-5xl md:text-7xl font-semibold tracking-[-2px] logo-font leading-none mb-6 fade-in" style="animation-delay: 0.4s">
                Welcome to Pronto Studio<br>Application Center
            </h1>
            <p class="text-xl text-slate-300 max-w-lg mx-auto mb-12 fade-in" style="animation-delay: 0.6s">
                Apply to join our creator network or become part of the staff team.
            </p>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center fade-in" style="animation-delay: 0.8s">
                <button onclick="navigateTo('creator')" 
                        class="bg-blue-600 hover:bg-blue-700 px-10 py-5 rounded-3xl font-semibold text-lg shadow-lg">
                    Apply as Creator
                </button>
                <button onclick="navigateTo('staff')" 
                        class="border-2 border-white/70 hover:bg-white/10 px-10 py-5 rounded-3xl font-semibold text-lg">
                    Apply for Staff
                </button>
            </div>
        </div>
    </div>

    <!-- CREATOR FORM -->
    <div id="page-creator" class="hidden py-16 relative">
        <div class="max-w-2xl mx-auto px-6">
            <div class="form-card bg-slate-900/95 backdrop-blur-xl rounded-3xl p-10 fade-in">
                <h2 class="text-3xl font-semibold mb-8 text-center">Creator Application</h2>
                
                <div class="space-y-7">
                    <div>
                        <label class="block text-sm font-medium mb-2 text-slate-400">Full Name</label>
                        <input id="c-name" type="text" class="form-input w-full h-14 rounded-3xl px-6 text-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2 text-slate-400">Discord Name or ID</label>
                        <input id="c-discord" type="text" placeholder="username#0000 or User ID" class="form-input w-full h-14 rounded-3xl px-6">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2 text-slate-400">Roblox Username</label>
                        <input id="c-roblox" type="text" placeholder="Your Roblox username" class="form-input w-full h-14 rounded-3xl px-6">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2 text-slate-400">Social Links (TikTok, YouTube, etc.)</label>
                        <input id="c-social" type="text" placeholder="https://tiktok.com/@yourusername" class="form-input w-full h-14 rounded-3xl px-6">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2 text-slate-400">Total Followers</label>
                        <input id="c-followers" type="text" placeholder="e.g. 15K or 150000" class="form-input w-full h-14 rounded-3xl px-6">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2 text-slate-400">Why do you want to join Pronto Studio?</label>
                        <textarea id="c-why" rows="4" placeholder="Tell us your motivation..." class="form-input w-full rounded-3xl p-6"></textarea>
                    </div>

                    <button onclick="submitCreatorForm()" 
                            class="w-full h-14 bg-blue-600 hover:bg-blue-700 rounded-3xl font-semibold text-lg mt-4">
                        Submit Creator Application
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- STAFF FORM -->
    <div id="page-staff" class="hidden py-16 relative">
        <div class="max-w-2xl mx-auto px-6">
            <div class="form-card bg-slate-900/95 backdrop-blur-xl rounded-3xl p-10 fade-in">
                <h2 class="text-3xl font-semibold mb-8 text-center">Staff Application</h2>
                
                <div class="space-y-7">
                    <div>
                        <label class="block text-sm font-medium mb-2 text-slate-400">Full Name</label>
                        <input id="s-name" type="text" class="form-input w-full h-14 rounded-3xl px-6">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2 text-slate-400">Discord Name or ID</label>
                        <input id="s-discord" type="text" placeholder="username#0000 or User ID" class="form-input w-full h-14 rounded-3xl px-6">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2 text-slate-400">Position You're Applying For</label>
                        <input id="s-position" type="text" placeholder="Moderator, Content Manager, Admin..." class="form-input w-full h-14 rounded-3xl px-6">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2 text-slate-400">Why do you want to become staff?</label>
                        <textarea id="s-why" rows="5" placeholder="Explain why you're a good fit..." class="form-input w-full rounded-3xl p-6"></textarea>
                    </div>

                    <button onclick="submitStaffForm()" 
                            class="w-full h-14 bg-blue-600 hover:bg-blue-700 rounded-3xl font-semibold text-lg mt-4">
                        Submit Staff Application
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- CONFIRMATION SCREEN -->
    <div id="confirmation-screen" class="hidden min-h-screen flex items-center justify-center relative">
        <div class="text-center max-w-md px-6 fade-in">
            <div class="text-8xl mb-6">🎉</div>
            <h2 class="text-4xl font-semibold mb-4">Application Submitted Successfully!</h2>
            <p class="text-slate-400 text-lg">Thank you! Your application has been received and forwarded to the team.</p>
            <button onclick="navigateTo('home')" 
                    class="mt-12 px-10 py-4 bg-blue-600 hover:bg-blue-700 rounded-3xl font-semibold text-lg">
                Return to Home
            </button>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1477127903736234157/mALJT5iM6LOD2lcpXyoWIQDha9FNbL7HjgL0AP8OExi19wNAQWcZ3yoFPd2eW6V_aO1Q";

        function navigateTo(page) {
            document.querySelectorAll('#page-home, #page-creator, #page-staff, #confirmation-screen').forEach(el => {
                el.classList.add('hidden');
            });
            document.getElementById(`page-${page}`).classList.remove('hidden');
        }

        async function sendToDiscord(data) {
            try {
                await fetch(WEBHOOK_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        embeds: [{
                            title: data.type === "creator" ? "New Creator Application" : "New Staff Application",
                            color: 0x3b82f6,
                            fields: Object.keys(data).map(key => ({
                                name: key.charAt(0).toUpperCase() + key.slice(1),
                                value: data[key] || "Not provided",
                                inline: key.length < 12
                            })),
                            timestamp: new Date().toISOString()
                        }]
                    })
                });
            } catch(e) {}
        }

        function submitCreatorForm() {
            const data = {
                type: "creator",
                name: document.getElementById("c-name").value || "Anonymous",
                discord: document.getElementById("c-discord").value,
                roblox: document.getElementById("c-roblox").value,
                social: document.getElementById("c-social").value,
                followers: document.getElementById("c-followers").value,
                why: document.getElementById("c-why").value
            };
            sendToDiscord(data);
            showConfirmation();
        }

        function submitStaffForm() {
            const data = {
                type: "staff",
                name: document.getElementById("s-name").value || "Anonymous",
                discord: document.getElementById("s-discord").value,
                position: document.getElementById("s-position").value,
                why: document.getElementById("s-why").value
            };
            sendToDiscord(data);
            showConfirmation();
        }

        function showConfirmation() {
            document.querySelectorAll('#page-home, #page-creator, #page-staff').forEach(el => el.classList.add('hidden'));
            document.getElementById('confirmation-screen').classList.remove('hidden');
        }

        // Initialize with smooth load
        window.onload = () => {
            navigateTo('home');
            console.log("%c✅ Pronto Studio Application Center loaded successfully", "color:#60a5fa; font-size:14px");
        };
    </script>
</body>
</html>
